<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>City Timeline</title>
<style>
  :root {
    --bg: #11131a; --panel: #1a1d27; --ink: #e7e9ee; --muted: #9aa0ad;
    --grid: #2a2e3a; --line: #3a3f4d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header { padding: 20px 24px 4px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0; font-weight: 650; }
  #region { background: #232733; color: var(--ink); border: 1px solid var(--line); border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; }
  section { margin: 18px 16px; background: var(--panel); border: 1px solid var(--grid); border-radius: 10px; padding: 14px 16px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 10px; font-weight: 600; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin: 10px 0 2px; color: var(--muted); font-size: 12.5px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  svg { width: 100%; height: auto; display: block; }
  #map { cursor: grab; user-select: none; touch-action: none; background: #0e1016; border-radius: 6px; }
  #map:active { cursor: grabbing; }
  text { fill: var(--ink); }
  .axis text { fill: var(--muted); font-size: 11px; }
  .axis line { stroke: var(--grid); }
  .rowlabel { fill: var(--ink); }
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .controls button {
    background: #232733; color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px; min-width: 34px;
  }
  .controls button:hover { background: #2c313f; }
  .controls input[type=range] { flex: 1; accent-color: #64b5f6; }
  .controls .chk { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: 12.5px; cursor: pointer; }
  #yearlabel { font-variant-numeric: tabular-nums; min-width: 84px; text-align: right; color: var(--ink); font-weight: 600; }
  #tip {
    position: fixed; pointer-events: none; z-index: 10; max-width: 300px;
    background: #0c0e14; border: 1px solid #3a3f4d; border-radius: 7px;
    padding: 8px 10px; font-size: 12.5px; color: var(--ink);
    box-shadow: 0 6px 24px rgba(0,0,0,.5); opacity: 0; transition: opacity .08s;
  }
  #tip .meta { color: var(--muted); }
  #error { margin: 18px 16px; padding: 16px; background: #2a1416; border: 1px solid #6b2330; border-radius: 10px; }
  code { background: #0c0e14; padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>City Timeline</h1>
  <select id="region" title="focus the views on a region"></select>
</header>

<div id="error" hidden>
  Couldn't load the data. Serve over HTTP: <code>python3 -m http.server 8000</code>, then open <code>/web/</code>.
</div>

<section id="map-sec">
  <h2>Empires through time</h2>
  <div class="controls">
    <button id="play" title="play / pause">&#9654;</button>
    <input id="year" type="range">
    <span id="yearlabel"></span>
    <button id="zoomreset" title="reset zoom">reset</button>
  </div>
  <svg id="map"></svg>
  <div class="legend" id="empire-legend"></div>
</section>

<section id="share-sec">
  <h2>Share of cities under each empire</h2>
  <svg id="share"></svg>
  <div class="legend" id="share-legend"></div>
</section>

<section id="sankey-sec">
  <h2>How control passed between empires</h2>
  <svg id="sankey"></svg>
</section>

<section id="emp-sec">
  <h2>Empires &amp; polities</h2>
  <svg id="empires"></svg>
</section>

<section id="pop-sec">
  <h2>Population over time</h2>
  <svg id="population"></svg>
</section>

<div id="tip"></div>

<script src="model.js"></script>
<script>
const SVGNS = "http://www.w3.org/2000/svg";
const tip = document.getElementById("tip");

const REGION_COLOR = {
  "mesopotamia-sumer": "#4db6ac", "mesopotamia-akkad": "#ba68c8",
  "mesopotamia-euphrates": "#ffb74d", "mesopotamia-assyria": "#ef9a9a",
  "egypt-lower": "#66bb6a", "egypt-upper": "#c5e1a5",
  "levant-coast": "#4fc3f7", "levant-inland": "#f06292",
  "iran-zagros": "#ff8a65", "anatolia": "#bcaaa4", "arabia": "#d4a76a", "caucasus": "#8d6e63",
  "greece": "#7986cb", "macedon": "#9fa8da",
  "nubia": "#cddc39", "pontic-steppe": "#26c6da", "north-africa": "#ffca28",
  "italy": "#e53935", "gaul": "#42a5f5", "iberia": "#8e24aa",
  "britannia": "#789262", "germania": "#6d4c41",
  "india": "#ff7043",
  "china": "#d32f2f", "korea": "#7e57c2", "southeast-asia": "#00897b",
  "steppe": "#827717", "japan": "#c2185b",
  "africa": "#f9a825", "americas": "#5e35b1", "oceania": "#26a69a",
  "europe-central": "#9ccc65", "europe-east": "#5d4037",
  "northern-europe": "#4fc3f7",
};

function el(name, attrs = {}, parent = null) {
  const node = document.createElementNS(SVGNS, name);
  for (const k in attrs) node.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(node);
  return node;
}
function fmtYear(y) { y = Math.round(y); return y < 0 ? (-y) + " BCE" : (y === 0 ? "0" : y + " CE"); }
function fmtPop(v) { return v >= 1000000 ? (v / 1000000) + "M" : (v / 1000) + "k"; }
function regionLabel(r) {
  if (!r) return "";
  const parts = r.split("-");
  const tail = parts.length > 1 ? parts.slice(1).join(" ") : r;
  return tail.replace(/\b\w/g, m => m.toUpperCase());
}
function yearTicks(min, max, step) {
  const t = [];
  for (let y = Math.ceil(min / step) * step; y <= max; y += step) t.push(y);
  return t;
}
function parseCSV(text) {
  const rows = []; let row = [], field = "", q = false;
  for (let i = 0; i < text.length; i++) { const c = text[i];
    if (q) { if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else q = false; } else field += c; }
    else if (c === '"') q = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n" || c === "\r") { if (c === "\r" && text[i + 1] === "\n") i++; row.push(field); field = ""; if (row.length > 1 || row[0] !== "") rows.push(row); row = []; }
    else field += c;
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.map(r => Object.fromEntries(header.map((h, i) => [h, (r[i] ?? "").trim()])));
}
function showTip(html, e) { tip.innerHTML = html; tip.style.opacity = 1; moveTip(e); }
function moveTip(e) {
  const pad = 14; let x = e.clientX + pad, y = e.clientY + pad;
  const r = tip.getBoundingClientRect();
  if (x + r.width > innerWidth) x = e.clientX - r.width - pad;
  if (y + r.height > innerHeight) y = e.clientY - r.height - pad;
  tip.style.left = x + "px"; tip.style.top = y + "px";
}
function hideTip() { tip.style.opacity = 0; }
function bindTip(node, html) {
  node.addEventListener("mouseenter", e => showTip(html, e));
  node.addEventListener("mousemove", moveTip);
  node.addEventListener("mouseleave", hideTip);
}
async function load(name) {
  const res = await fetch(name, { cache: "no-store" });
  if (!res.ok) throw new Error(name + ": " + res.status);
  return parseCSV(await res.text());
}
async function loadJSON(name) {
  try { const r = await fetch(name, { cache: "no-store" }); return r.ok ? await r.json() : null; }
  catch (e) { return null; }
}

// physical features under the map points
function drawBasemap(parent, geo, x, y) {
  const g = el("g", {}, parent);
  const path = pts => pts.map((c, i) => (i ? "L" : "M") + x(c[0]).toFixed(1) + "," + y(c[1]).toFixed(1)).join(" ");
  const STYLE = {
    coastline: { stroke: "#3f4a5a", "stroke-width": 1, fill: "none" },
    river: { stroke: "#3d6585", "stroke-width": 0.9, fill: "none", "stroke-opacity": .8 },
    lake: { stroke: "none", fill: "#1b2a3a" },
  };
  const draw = (st, d) => { if (d) el("path", { ...st, d }, g); };
  for (const f of (geo.features || [])) {
    const kind = (f.properties && f.properties.kind) || "coastline";
    const st = STYLE[kind] || STYLE.coastline;
    const gm = f.geometry; if (!gm) continue;
    if (gm.type === "LineString") draw(st, path(gm.coordinates));
    else if (gm.type === "MultiLineString") gm.coordinates.forEach(l => draw(st, path(l)));
    else if (gm.type === "Polygon") draw(st, gm.coordinates.map(r => path(r) + "Z").join(" "));
    else if (gm.type === "MultiPolygon") gm.coordinates.forEach(p => draw(st, p.map(r => path(r) + "Z").join(" ")));
  }
}

// star path of given radius centered at (cx,cy) — used for capital cities
function starPath(cx, cy, r) {
  let d = "";
  for (let k = 0; k < 10; k++) {
    const rr = k % 2 ? r * 0.45 : r;
    const a = -Math.PI / 2 + k * Math.PI / 5;
    d += (k ? "L" : "M") + (cx + rr * Math.cos(a)).toFixed(1) + "," + (cy + rr * Math.sin(a)).toFixed(1) + " ";
  }
  return d + "Z";
}

// Shared map state, so the zoom/pan handlers (bound once) keep working after the views
// are rebuilt for a different region.
const MAP = { svg: null, vb: null, home: null, W: 1120, H: 540 };
function applyVB() { if (MAP.svg && MAP.vb) MAP.svg.setAttribute("viewBox", `${MAP.vb.x} ${MAP.vb.y} ${MAP.vb.w} ${MAP.vb.h}`); }
function bindMapControls() {
  const svg = document.getElementById("map");
  svg.addEventListener("wheel", e => {
    e.preventDefault();
    if (!MAP.vb) return;
    const rect = svg.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width, py = (e.clientY - rect.top) / rect.height;
    const f = e.deltaY < 0 ? 0.85 : 1.18;
    const ptx = MAP.vb.x + px * MAP.vb.w, pty = MAP.vb.y + py * MAP.vb.h;
    MAP.vb.w = Math.min(MAP.W * 1.4, Math.max(MAP.W * 0.04, MAP.vb.w * f));
    MAP.vb.h = Math.min(MAP.H * 1.4, Math.max(MAP.H * 0.04, MAP.vb.h * f));
    MAP.vb.x = ptx - px * MAP.vb.w; MAP.vb.y = pty - py * MAP.vb.h;
    applyVB();
  }, { passive: false });
  let drag = null;
  svg.addEventListener("mousedown", e => { drag = { x: e.clientX, y: e.clientY }; });
  window.addEventListener("mousemove", e => {
    if (!drag || !MAP.vb) return;
    const rect = svg.getBoundingClientRect();
    MAP.vb.x -= (e.clientX - drag.x) * (MAP.vb.w / rect.width);
    MAP.vb.y -= (e.clientY - drag.y) * (MAP.vb.h / rect.height);
    drag = { x: e.clientX, y: e.clientY }; applyVB();
  });
  window.addEventListener("mouseup", () => { drag = null; });
  document.getElementById("zoomreset").addEventListener("click", () => { if (MAP.home) { MAP.vb = { ...MAP.home }; applyVB(); } });
}

// convex hull (Andrew's monotone chain) over {x,y} screen points
function convexHull(pts) {
  if (pts.length < 3) return pts.slice();
  const p = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lo = [], hi = [];
  for (const q of p) { while (lo.length >= 2 && cross(lo[lo.length - 2], lo[lo.length - 1], q) <= 0) lo.pop(); lo.push(q); }
  for (let i = p.length - 1; i >= 0; i--) { const q = p[i]; while (hi.length >= 2 && cross(hi[hi.length - 2], hi[hi.length - 1], q) <= 0) hi.pop(); hi.push(q); }
  lo.pop(); hi.pop(); return lo.concat(hi);
}

// the map is a year machine: scrub/play to see empires spread, zoom with the wheel, drag to pan
function setupMap(model, basemap, onSelect) {
  const svg = document.getElementById("map");
  svg.innerHTML = "";
  const located = model.cities.filter(c => c.lat !== "" && c.lon !== "");
  const lats = located.map(c => +c.lat), lons = located.map(c => +c.lon);
  const padLat = (Math.max(...lats) - Math.min(...lats)) * 0.12 + 0.3;
  const padLon = (Math.max(...lons) - Math.min(...lons)) * 0.12 + 0.3;
  const minLat = Math.min(...lats) - padLat, maxLat = Math.max(...lats) + padLat;
  const minLon = Math.min(...lons) - padLon, maxLon = Math.max(...lons) + padLon;

  const W = MAP.W, H = MAP.H, Mg = 24;
  const s = Math.min((W - 2 * Mg) / (maxLon - minLon), (H - 2 * Mg) / (maxLat - minLat));
  const x = lon => Mg + (lon - minLon) * s;
  const y = lat => H - Mg - (lat - minLat) * s;

  MAP.svg = svg; MAP.home = { x: 0, y: 0, w: W, h: H }; MAP.vb = { ...MAP.home };
  applyVB();

  const baseG = el("g", {}, svg);
  if (basemap) drawBasemap(baseG, basemap, x, y);
  const hullG = el("g", {}, svg);
  const markerG = el("g", {}, svg);
  let lastYear = 0, selectedPolity = null;

  function drawHull(year) {
    hullG.innerHTML = "";
    if (!selectedPolity) return;
    const pts = TimelineModel.stateAt(model, year)
      .filter(sg => sg.polity === selectedPolity)
      .map(sg => ({ x: x(+sg.city.lon), y: y(+sg.city.lat) }));
    if (pts.length < 2) return;
    const color = model.empColor[selectedPolity] || "#fff";
    if (pts.length === 2) {
      el("line", { x1: pts[0].x, y1: pts[0].y, x2: pts[1].x, y2: pts[1].y, stroke: color, "stroke-width": 2, "stroke-opacity": .55 }, hullG);
    } else {
      const hull = convexHull(pts);
      el("polygon", { points: hull.map(q => `${q.x.toFixed(1)},${q.y.toFixed(1)}`).join(" "),
        fill: color, "fill-opacity": .14, stroke: color, "stroke-opacity": .55, "stroke-width": 1.5 }, hullG);
    }
  }

  const legendBox = document.getElementById("empire-legend");
  function update(year) {
    lastYear = year;
    markerG.innerHTML = "";
    const state = TimelineModel.stateAt(model, year);

    for (const sg of state) {
      const c = sg.city;
      const info = model.cityInfo[sg.id];
      const cx = x(+c.lon), cy = y(+c.lat);
      const capital = TimelineModel.isCapitalAt(info, year);
      const nm = TimelineModel.nameAt(model, sg.id, year);   // period-appropriate name
      const r = 4.5;   // uniform marker size (population is shown in its own panel)
      // capitals are drawn as stars, ordinary cities as circles
      const node = capital
        ? el("path", { d: starPath(cx, cy, r + 1.5), fill: sg.color, "fill-opacity": .85, stroke: sg.color, "stroke-width": 1 }, markerG)
        : el("circle", { cx, cy, r, fill: sg.color, "fill-opacity": .6, stroke: sg.color, "stroke-width": 1 }, markerG);
      node.style.cursor = "pointer";
      const pol = sg.polity;
      node.addEventListener("click", e => { e.stopPropagation(); if (onSelect) onSelect(pol); });
      bindTip(node, `<b>${nm}</b>${capital ? " &#9733;" : ""}<br><span class="meta">${sg.polity || "independent / no record"}</span>`
        + (sg.pop ? `<br><span class="meta">~${sg.pop.toLocaleString()}</span>` : "")
        + `<br><span class="meta">${regionLabel(c.region)}</span>`);
      // minor cities are hover-only; label major cities (sizable or a capital that year)
      if (TimelineModel.isMajorAt(info, year)) {
        const lab = el("text", { x: cx + r + 3, y: cy + 3, "font-size": 10 }, markerG);
        lab.setAttribute("fill", "#cfd3da"); lab.textContent = nm;
      }
    }
    drawHull(year);
    legendBox.innerHTML = "";
    const active = TimelineModel.empiresActiveAt(model, year)
      .filter(e => e.cities.size >= 2)
      .sort((a, b) => b.cities.size - a.cities.size).slice(0, 12);
    for (const e of active) {
      const sp = document.createElement("span");
      const sw = document.createElement("span");
      sw.style.cssText = `width:12px;height:12px;border-radius:2px;background:${e.color}`;
      sp.appendChild(sw); sp.appendChild(document.createTextNode(e.name));
      legendBox.appendChild(sp);
    }
  }
  function setHull(name) { selectedPolity = name; drawHull(lastYear); }
  return { update, setHull };
}

// stacked area: fraction of all cities each empire controls over time (sums to 1)
function renderControlShare(model) {
  const svg = document.getElementById("share");
  // Start at the first recorded empire so the chart isn't mostly empty prehistory.
  const firstControl = model.empires.length ? Math.min(...model.empires.map(e => e.start)) : model.domain.min;
  const minY = firstControl, maxY = model.domain.max;
  const N = 260, step = (maxY - minY) / N;
  const samples = [];
  for (let i = 0; i <= N; i++) samples.push(Math.round(minY + i * step));
  const shares = samples.map(yr => TimelineModel.shareAt(model, yr).share);

  const peak = {};
  for (const s of shares) for (const p in s) peak[p] = Math.max(peak[p] || 0, s[p]);
  const shown = Object.keys(peak)
    .filter(p => p !== "Independent" && peak[p] >= 0.03)
    .sort((a, b) => peak[b] - peak[a]).slice(0, 16);
  const shownSet = new Set(shown);
  const firstYear = {};
  for (const p of shown) for (let i = 0; i < samples.length; i++) if ((shares[i][p] || 0) > 0) { firstYear[p] = samples[i]; break; }
  const empires = shown.slice().sort((a, b) => (firstYear[a] ?? 0) - (firstYear[b] ?? 0));
  const layers = ["Independent", ...empires, "Other"];
  const colorOf = l => l === "Independent" ? "#363b47" : l === "Other" ? "#586070" : (model.empColor[l] || "#888");
  const valAt = (l, i) => {
    if (l === "Independent") return shares[i]["Independent"] || 0;
    if (l === "Other") { let o = 0; for (const p in shares[i]) if (p !== "Independent" && !shownSet.has(p)) o += shares[i][p]; return o; }
    return shares[i][l] || 0;
  };

  const M = { top: 10, right: 24, bottom: 30, left: 40 }, W = 1120, H = 300;
  const innerW = W - M.left - M.right, innerH = H - M.top - M.bottom;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.innerHTML = "";
  const x = yr => M.left + (yr - minY) / (maxY - minY) * innerW;
  const yv = v => M.top + innerH * (1 - v);

  const axis = el("g", { class: "axis" }, svg);
  for (const t of [0, 0.25, 0.5, 0.75, 1]) {
    el("line", { x1: M.left, y1: yv(t), x2: W - M.right, y2: yv(t) }, axis);
    const l = el("text", { x: M.left - 6, y: yv(t) + 4, "text-anchor": "end" }, axis); l.textContent = t;
  }
  for (const t of yearTicks(minY, maxY, 1000)) {
    const l = el("text", { x: x(t), y: H - M.bottom + 15, "text-anchor": "middle" }, axis); l.textContent = fmtYear(t);
  }

  const bandEls = [];
  let cum = samples.map(() => 0);
  for (const layer of layers) {
    const top = samples.map((_, i) => cum[i] + valAt(layer, i));
    const ptsTop = samples.map((s, i) => `${x(s).toFixed(1)},${yv(top[i]).toFixed(1)}`);
    const ptsBot = samples.map((s, i) => `${x(s).toFixed(1)},${yv(cum[i]).toFixed(1)}`).reverse();
    const fill = colorOf(layer);
    const poly = el("polygon", { points: ptsTop.concat(ptsBot).join(" "), fill,
      "fill-opacity": (layer === "Independent" || layer === "Other") ? .55 : .85 }, svg);
    bandEls.push({ el: poly, layer });
    if (layer !== "Independent" && layer !== "Other") {
      poly.style.cursor = "pointer";
      bindTip(poly, `<b>${layer}</b><br><span class="meta">peak ${Math.round(peak[layer] * 100)}% of all cities</span>`);
    }
    cum = top;
  }

  let onSeek = null;
  const marker = el("line", { x1: x(minY), y1: M.top, x2: x(minY), y2: H - M.bottom, stroke: "#fff", "stroke-width": 1.2, "stroke-opacity": .85 }, svg);
  svg.style.cursor = "crosshair";
  svg.addEventListener("click", e => {
    const rect = svg.getBoundingClientRect();
    const yr = Math.round(minY + ((e.clientX - rect.left) / rect.width) * (maxY - minY));
    if (onSeek) onSeek(yr);
  });

  const legend = document.getElementById("share-legend"); legend.innerHTML = "";
  for (const layer of [...empires, "Other"]) {
    const sp = document.createElement("span"), sw = document.createElement("span");
    sw.style.cssText = `width:12px;height:12px;border-radius:2px;background:${colorOf(layer)}`;
    sp.appendChild(sw); sp.appendChild(document.createTextNode(layer)); legend.appendChild(sp);
  }

  return {
    update(year) { const xx = x(Math.max(minY, Math.min(maxY, year))); marker.setAttribute("x1", xx); marker.setAttribute("x2", xx); },
    setSeek(fn) { onSeek = fn; },
    highlight(name) { for (const b of bandEls) b.el.style.opacity = (!name || b.layer === name) ? 1 : 0.12; },
  };
}

// alluvial / Sankey: cities flowing between controlling empires across time checkpoints
function renderSankey(model, onSelect) {
  const svg = document.getElementById("sankey");
  const ALL_CP = [-3000, -2500, -2000, -1500, -1000, -500, -330, -200, 1, 117, 300, 476, 650, 900, 1100, 1260, 1450, 1600, 1800, 2020];
  const CP = ALL_CP.filter(y => y >= model.domain.min && y <= model.domain.max);
  if (CP.length < 2) { document.getElementById("sankey").innerHTML = ""; return; }
  const { snaps } = TimelineModel.controlFlows(model, CP);

  // top controllers by peak column count (excluding Independent); rest become "Other"
  const peak = {};
  for (const s of snaps) { const c = {}; for (const id in s) c[s[id]] = (c[s[id]] || 0) + 1; for (const k in c) peak[k] = Math.max(peak[k] || 0, c[k]); }
  const shown = new Set(Object.keys(peak).filter(k => k !== "Independent").sort((a, b) => peak[b] - peak[a]).slice(0, 26));
  const lab = n => n === "Independent" ? "Independent" : (shown.has(n) ? n : "Other");
  const rsnaps = snaps.map(s => { const o = {}; for (const id in s) o[id] = lab(s[id]); return o; });
  const cols = rsnaps.map(s => { const c = {}; for (const id in s) c[s[id]] = (c[s[id]] || 0) + 1; return c; });
  const maxTotal = Math.max(...cols.map(c => Object.values(c).reduce((a, b) => a + b, 0)));

  // stable vertical order (by peak), with Other and Independent pushed to the bottom
  const seen = new Set(), order = [];
  for (const c of cols) for (const k of Object.keys(c).sort((a, b) => (peak[b] || 0) - (peak[a] || 0))) if (!seen.has(k)) { seen.add(k); order.push(k); }
  const tail = ["Other", "Independent"].filter(x => seen.has(x));
  const ord = order.filter(x => !tail.includes(x)).concat(tail);
  const rank = {}; ord.forEach((k, i) => rank[k] = i);

  const M = { top: 24, right: 130, bottom: 10, left: 10 }, W = 1120, H = 540;
  const innerW = W - M.left - M.right, innerH = H - M.top - M.bottom;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.innerHTML = "";
  const nw = 12, gap = 3;
  const scale = (innerH - 14 * gap) / maxTotal;
  const colX = i => M.left + nw / 2 + i * (innerW - nw) / (CP.length - 1);
  const colorOf = k => k === "Independent" ? "#363b47" : k === "Other" ? "#586070" : (model.empColor[k] || "#888");

  const nodes = cols.map((c, ci) => {
    const present = Object.keys(c).sort((a, b) => rank[a] - rank[b]);
    const total = present.reduce((s, k) => s + c[k], 0);
    const blockH = total * scale + (present.length - 1) * gap;
    let y = M.top + (innerH - blockH) / 2;
    const map = {};
    for (const k of present) { const h = c[k] * scale; map[k] = { x: colX(ci), yTop: y, h, count: c[k] }; y += h + gap; }
    return map;
  });

  const axis = el("g", { class: "axis" }, svg);
  CP.forEach((y, i) => { const t = el("text", { x: colX(i), y: 14, "text-anchor": "middle", "font-size": 10 }, axis); t.textContent = fmtYear(y); });

  const ribbonG = el("g", {}, svg);
  const nodeEls = [], ribbonEls = [];
  function highlight(name) {
    for (const n of nodeEls) n.el.style.opacity = (!name || n.name === name) ? 1 : 0.12;
    for (const r of ribbonEls) r.el.style.opacity = (!name) ? 1 : (r.src === name || r.dst === name) ? 1 : 0.06;
  }
  svg.addEventListener("click", () => { if (onSelect) onSelect(null); });   // background click clears

  for (let i = 0; i < rsnaps.length - 1; i++) {
    const a = rsnaps[i], b = rsnaps[i + 1], srcN = nodes[i], dstN = nodes[i + 1];
    const f = {};
    for (const id in a) if (id in b) { const s = a[id], d = b[id]; (f[s] || (f[s] = {}))[d] = ((f[s][d]) || 0) + 1; }
    const list = [];
    for (const s in f) for (const d in f[s]) list.push({ s, d, c: f[s][d] });
    const bySrc = {}, byDst = {};
    list.forEach(fl => { (bySrc[fl.s] || (bySrc[fl.s] = [])).push(fl); (byDst[fl.d] || (byDst[fl.d] = [])).push(fl); });
    for (const s in bySrc) { bySrc[s].sort((p, q) => rank[p.d] - rank[q.d]); let off = srcN[s].yTop; for (const fl of bySrc[s]) { fl.sy = off; off += fl.c * scale; } }
    for (const d in byDst) { byDst[d].sort((p, q) => rank[p.s] - rank[q.s]); let off = dstN[d].yTop; for (const fl of byDst[d]) { fl.dy = off; off += fl.c * scale; } }
    for (const fl of list) {
      const x0 = srcN[fl.s].x + nw / 2, x1 = dstN[fl.d].x - nw / 2, w = fl.c * scale, xm = (x0 + x1) / 2;
      const d = `M${x0},${fl.sy} C${xm},${fl.sy} ${xm},${fl.dy} ${x1},${fl.dy} L${x1},${fl.dy + w} C${xm},${fl.dy + w} ${xm},${fl.sy + w} ${x0},${fl.sy + w} Z`;
      const path = el("path", { d, fill: colorOf(fl.s), "fill-opacity": fl.s === "Independent" ? .16 : .34 }, ribbonG);
      path.style.cursor = "pointer";
      ribbonEls.push({ el: path, src: fl.s, dst: fl.d });
      const srcName = fl.s;
      path.addEventListener("click", e => { e.stopPropagation(); if (onSelect) onSelect(srcName); });
      bindTip(path, `<b>${fl.s} → ${fl.d}</b><br><span class="meta">${fl.c} cit${fl.c === 1 ? "y" : "ies"}</span>`);
    }
  }

  const nodeG = el("g", {}, svg);
  nodes.forEach((map, ci) => {
    for (const k in map) {
      const n = map[k];
      const r = el("rect", { x: n.x - nw / 2, y: n.yTop, width: nw, height: Math.max(1, n.h), fill: colorOf(k) }, nodeG);
      r.style.cursor = "pointer";
      nodeEls.push({ el: r, name: k });
      const nodeName = k;
      r.addEventListener("click", e => { e.stopPropagation(); if (onSelect) onSelect(nodeName); });
      bindTip(r, `<b>${k}</b><br><span class="meta">${fmtYear(CP[ci])} · ${n.count} cit${n.count === 1 ? "y" : "ies"}</span>`);
      if (ci === nodes.length - 1) { const t = el("text", { x: n.x + nw / 2 + 4, y: n.yTop + n.h / 2 + 3, "font-size": 9 }, nodeG); t.setAttribute("fill", "#cfd3da"); t.textContent = k; }
    }
  });
  return { highlight };
}

// empire-centric lifespans — rows scale with #polities, not #cities
function renderEmpires(model) {
  const svg = document.getElementById("empires");
  const emps = model.empires;
  const M = { top: 10, right: 24, bottom: 30, left: 180 }, W = 1120;
  const rh = 18;
  const innerW = W - M.left - M.right;
  const H = M.top + emps.length * rh + M.bottom;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.innerHTML = "";
  const minY = model.domain.min, maxY = model.domain.max;
  const x = y => M.left + (y - minY) / (maxY - minY) * innerW;

  const axis = el("g", { class: "axis" }, svg);
  for (const t of yearTicks(minY, maxY, 1000)) {
    el("line", { x1: x(t), y1: M.top, x2: x(t), y2: H - M.bottom }, axis);
    const l = el("text", { x: x(t), y: H - M.bottom + 15, "text-anchor": "middle" }, axis);
    l.textContent = fmtYear(t);
  }
  const rowEls = [];
  emps.forEach((e, i) => {
    const cy = M.top + i * rh + rh / 2;
    const lab = el("text", { x: M.left - 8, y: cy + 3, "text-anchor": "end", class: "rowlabel", "font-size": 10 }, svg);
    lab.textContent = e.name;
    const x1 = x(e.start), x2 = Math.max(x(e.end), x1 + 3);
    const bar = el("line", { x1, y1: cy, x2, y2: cy, stroke: e.color, "stroke-width": 7, "stroke-linecap": "round" }, svg);
    bar.style.cursor = "pointer";
    const span = e.start === e.end ? fmtYear(e.start) : fmtYear(e.start) + " – " + fmtYear(e.end);
    const cityNames = [...e.cities].map(id => (model.cityById[id] || {}).canonical_name || id).sort().join(", ");
    bindTip(bar, `<b>${e.name}</b><br><span class="meta">${span} · ${e.cities.size} cit${e.cities.size === 1 ? "y" : "ies"}</span><br><span class="meta">${cityNames}</span>`);
    rowEls.push({ bar, lab, name: e.name });
  });
  return {
    highlight(name) {
      for (const r of rowEls) { const on = !name || r.name === name; r.bar.style.opacity = on ? 1 : 0.15; r.lab.style.opacity = on ? 1 : 0.3; }
    },
  };
}

function renderPopulation(model) {
  const svg = document.getElementById("population");
  const pts = [];
  for (const id in model.cityInfo) {
    const c = model.cityById[id];
    for (const p of model.cityInfo[id].pops)
      pts.push({ id, name: c ? c.canonical_name : id, region: c ? c.region : "", year: p.year, val: p.val });
  }
  const M = { top: 16, right: 96, bottom: 30, left: 54 }, W = 1120, H = 320;
  const innerW = W - M.left - M.right, innerH = H - M.top - M.bottom;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.innerHTML = "";
  if (!pts.length) return;

  const minY = Math.min(...pts.map(p => p.year)) - 200, maxY = Math.max(...pts.map(p => p.year)) + 200;
  const minV = 3000, maxV = 10000000;
  const x = y => M.left + (y - minY) / (maxY - minY) * innerW;
  const lv = v => Math.log10(v);
  const yp = v => M.top + innerH * (1 - (lv(v) - lv(minV)) / (lv(maxV) - lv(minV)));

  const axis = el("g", { class: "axis" }, svg);
  for (const v of [5000, 10000, 50000, 100000, 500000, 1000000, 5000000, 10000000]) {
    el("line", { x1: M.left, y1: yp(v), x2: W - M.right, y2: yp(v) }, axis);
    const t = el("text", { x: M.left - 8, y: yp(v) + 4, "text-anchor": "end" }, axis);
    t.textContent = fmtPop(v);
  }
  for (const t of yearTicks(minY, maxY, 1000)) {
    const l = el("text", { x: x(t), y: H - M.bottom + 15, "text-anchor": "middle" }, axis);
    l.textContent = fmtYear(t);
  }
  const groups = {};
  for (const p of pts) (groups[p.id] || (groups[p.id] = [])).push(p);
  for (const id in groups) {
    const g = groups[id].sort((a, b) => a.year - b.year);
    const color = REGION_COLOR[g[0].region] || "#90caf9";
    if (g.length > 1)
      el("polyline", { fill: "none", stroke: color, "stroke-width": 1.5, "stroke-opacity": .8,
        points: g.map(p => `${x(p.year)},${yp(p.val)}`).join(" ") }, svg);
    for (const p of g) {
      const c = el("circle", { cx: x(p.year), cy: yp(p.val), r: 4.5, fill: color }, svg);
      c.style.cursor = "pointer";
      bindTip(c, `<b>${p.name}</b><br><span class="meta">~${p.val.toLocaleString()} · ${fmtYear(p.year)}</span>`);
    }
    const last = g[g.length - 1];
    const lab = el("text", { x: x(last.year) + 8, y: yp(last.val) + 4, "font-size": 11 }, svg);
    lab.setAttribute("fill", color); lab.textContent = last.name;
  }
}

// Region groups for the focus dropdown: label -> region prefixes to include.
const MACRO = [
  ["Mesopotamia", ["mesopotamia"]],
  ["Egypt & Nubia", ["egypt", "nubia"]],
  ["Levant", ["levant"]],
  ["Arabia", ["arabia"]],
  ["Anatolia & Caucasus", ["anatolia", "caucasus"]],
  ["Greece & Macedon", ["greece", "macedon"]],
  ["Iran & Central Asia", ["iran", "steppe"]],
  ["Pontic Steppe", ["pontic-steppe"]],
  ["Italy", ["italy"]],
  ["Western Europe", ["gaul", "iberia", "britannia", "germania"]],
  ["Northern Europe", ["northern-europe"]],
  ["Central & Eastern Europe", ["europe-central", "europe-east"]],
  ["South Asia", ["india"]],
  ["East Asia", ["china", "japan", "korea"]],
  ["Southeast Asia", ["southeast-asia"]],
  ["North Africa", ["north-africa"]],
  ["Sub-Saharan Africa", ["africa"]],
  ["Americas", ["americas"]],
  ["Oceania", ["oceania"]],
];
const inMacro = (region, prefixes) => prefixes.some(p => region === p || region.startsWith(p + "-"));

(async function main() {
  let basemap = null, rawCities = null, rawObs = null, rawNames = null;
  let mapView = null, shareView = null, sankeyView = null, empiresView = null;
  let timer = null, curStep = 100, selected = null;
  const slider = document.getElementById("year");
  const label = document.getElementById("yearlabel");
  const playBtn = document.getElementById("play");
  const regionSel = document.getElementById("region");

  const setYear = v => { label.textContent = fmtYear(+v); if (mapView) mapView.update(+v); if (shareView) shareView.update(+v); };

  // Selecting an empire (by clicking a city or a Sankey band) lights it up everywhere.
  function selectEmpire(name) {
    selected = (name && name === selected) ? null : (name || null);
    if (mapView) mapView.setHull(selected);
    if (shareView) shareView.highlight(selected);
    if (sankeyView) sankeyView.highlight(selected);
    if (empiresView) empiresView.highlight(selected);
  }

  function showModel(model) {
    if (timer) { clearInterval(timer); timer = null; playBtn.innerHTML = "&#9654;"; }
    selected = null;
    mapView = setupMap(model, basemap, selectEmpire);
    shareView = renderControlShare(model);
    sankeyView = renderSankey(model, selectEmpire);
    empiresView = renderEmpires(model);
    renderPopulation(model);
    shareView.setSeek(yr => { slider.value = yr; setYear(yr); });
    slider.min = model.domain.min; slider.max = model.domain.max; slider.step = 1;
    let v = +slider.value;
    if (!Number.isFinite(v) || v < model.domain.min || v > model.domain.max) v = model.domain.min;
    slider.value = v;
    curStep = Math.max(5, Math.round((model.domain.max - model.domain.min) / 500));
    setYear(v);
  }

  function applyRegion(key, full) {
    if (key === "all") return showModel(full);
    const prefixes = (MACRO.find(m => m[0] === key) || [null, []])[1];
    const subCities = rawCities.filter(c => inMacro(c.region, prefixes));
    const ids = new Set(subCities.map(c => c.city_id));
    const subObs = rawObs.filter(o => ids.has(o.city_id));
    const subNames = rawNames.filter(n => ids.has(n.city_id));
    showModel(TimelineModel.build(subCities, subObs, subNames));
  }

  try {
    [rawCities, rawNames, rawObs] = await Promise.all([
      load("../data/cities.csv"), load("../data/names.csv"), load("../data/observations.csv")
    ]);
    basemap = await loadJSON("basemap.geojson");
    const fullModel = TimelineModel.build(rawCities, rawObs, rawNames);

    bindMapControls();
    slider.value = -2000;

    // dropdown: All + the macro regions that actually have cities
    regionSel.innerHTML = "";
    const optAll = document.createElement("option"); optAll.value = "all"; optAll.textContent = "All regions";
    regionSel.appendChild(optAll);
    for (const [labelTxt, prefixes] of MACRO) {
      if (!rawCities.some(c => inMacro(c.region, prefixes))) continue;
      const o = document.createElement("option"); o.value = labelTxt; o.textContent = labelTxt;
      regionSel.appendChild(o);
    }
    regionSel.addEventListener("change", () => applyRegion(regionSel.value, fullModel));

    slider.addEventListener("input", () => setYear(slider.value));
    playBtn.addEventListener("click", () => {
      if (timer) { clearInterval(timer); timer = null; playBtn.innerHTML = "&#9654;"; return; }
      if (+slider.value >= +slider.max) slider.value = slider.min;
      playBtn.innerHTML = "&#10073;&#10073;";
      timer = setInterval(() => {
        let v = +slider.value + curStep;
        if (v >= +slider.max) { v = +slider.max; clearInterval(timer); timer = null; playBtn.innerHTML = "&#9654;"; }
        slider.value = v; setYear(v);
      }, 60);
    });

    showModel(fullModel);
  } catch (e) {
    document.getElementById("error").hidden = false;
    for (const id of ["map-sec", "share-sec", "sankey-sec", "emp-sec", "pop-sec"]) {
      const el2 = document.getElementById(id); if (el2) el2.hidden = true;
    }
    console.error(e);
  }
})();
</script>
